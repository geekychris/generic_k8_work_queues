# Minimal controller deployment -- no example queues.
# Replace the ConfigMap with your own queue definitions.
# See docs/ARCHITECTURE.md Section 7 for the full config reference.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kqueue-controller
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "update", "get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "update", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kqueue-controller
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
subjects:
  - kind: ServiceAccount
    name: kqueue-controller
    namespace: kqueue
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kqueue-controller
---
# Replace this ConfigMap with your own queue definitions.
# This is an empty config with no queues -- the controller will start
# but won't create any worker deployments until you add queues.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kqueue-config
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
data:
  config.yaml: |
    server:
      port: 8080
      ui_enabled: true

    nats:
      url: nats://nats.kqueue.svc:4222
      stream_prefix: kqueue

    # Add your queues here. Example:
    # queues:
    #   - name: my-worker
    #     worker_image: my-registry/my-worker:latest
    #     replicas:
    #       min: 1
    #       max: 10
    #     max_retries: 3
    #     processing_timeout: 60s
    #     scale_strategy:
    #       type: threshold
    #       scale_up_threshold: 10
    #       scale_down_threshold: 2
    queues: []

    metrics:
      enabled: true
      port: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kqueue-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kqueue-controller
        app.kubernetes.io/part-of: kqueue
    spec:
      serviceAccountName: kqueue-controller
      containers:
        - name: controller
          image: kqueue/controller:latest
          args:
            - "--config=/etc/kqueue/config.yaml"
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/kqueue
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: kqueue-config
---
apiVersion: v1
kind: Service
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
spec:
  selector:
    app.kubernetes.io/name: kqueue-controller
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
