apiVersion: v1
kind: ServiceAccount
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kqueue-controller
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "update", "get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "update", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kqueue-controller
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
subjects:
  - kind: ServiceAccount
    name: kqueue-controller
    namespace: kqueue
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kqueue-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kqueue-config
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
data:
  config.yaml: |
    server:
      port: 8080
      ui_enabled: true

    nats:
      url: nats://nats.kqueue.svc:4222
      stream_prefix: kqueue

    queues:
      - name: echo
        worker_image: kqueue/echo-worker:latest
        image_pull_policy: Never
        replicas:
          min: 1
          max: 10
        resources:
          cpu_request: "100m"
          cpu_limit: "500m"
          memory_request: "64Mi"
          memory_limit: "256Mi"
        max_retries: 3
        processing_timeout: 60s
        scale_strategy:
          type: threshold
          scale_up_threshold: 10
          scale_down_threshold: 2
          cooldown_seconds: 30
          scale_up_step: 2
          scale_down_step: 1

      - name: nlp
        worker_image: kqueue/nlp-worker:latest
        image_pull_policy: Never
        replicas:
          min: 1
          max: 5
        resources:
          cpu_request: "200m"
          cpu_limit: "1000m"
          memory_request: "128Mi"
          memory_limit: "512Mi"
        max_retries: 2
        processing_timeout: 120s
        scale_strategy:
          type: target_per_worker
          target_per_worker: 5
          cooldown_seconds: 60
          startup_cost_seconds: 30
          min_idle_workers: 1
        payload_schema:
          type: object
          required:
            - text
          properties:
            text:
              type: string

      - name: sandbox
        worker_image: kqueue/sandbox-worker:latest
        image_pull_policy: Never
        replicas:
          min: 1
          max: 5
        resources:
          cpu_request: "100m"
          cpu_limit: "1000m"
          memory_request: "64Mi"
          memory_limit: "512Mi"
        max_retries: 1
        processing_timeout: 60s
        scale_strategy:
          type: threshold
          scale_up_threshold: 5
          scale_down_threshold: 1
          cooldown_seconds: 30
        payload_schema:
          type: object
          required:
            - action
          properties:
            action:
              type: string
              enum: ["exec", "eval", "script"]

      - name: codereview
        worker_image: kqueue/codereview-worker:latest
        image_pull_policy: Never
        worker_env:
          OPENCLAUDE_PROVIDER: ollama
          OPENCLAUDE_MODEL: llama3.2
          OLLAMA_URL: "http://host.docker.internal:11434"
          OLLAMA_BASE_URL: "http://host.docker.internal:11434"
          OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
          OPENAI_MODEL: llama3.2
          GITHUB_TOKEN: ""
          POST_REVIEWS: "true"
        replicas:
          min: 1
          max: 3
        resources:
          cpu_request: "100m"
          cpu_limit: "500m"
          memory_request: "128Mi"
          memory_limit: "512Mi"
        max_retries: 2
        processing_timeout: 300s
        scale_strategy:
          type: target_per_worker
          target_per_worker: 2
          cooldown_seconds: 60
          startup_cost_seconds: 10
          min_idle_workers: 1
        payload_schema:
          type: object
          required:
            - action
            - repo_owner
            - repo_name
          properties:
            action:
              type: string
              enum: ["review_pr", "review_push"]

    metrics:
      enabled: true
      port: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kqueue-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kqueue-controller
        app.kubernetes.io/part-of: kqueue
    spec:
      serviceAccountName: kqueue-controller
      containers:
        - name: controller
          image: kqueue/controller:latest
          imagePullPolicy: Never
          args:
            - "--config=/etc/kqueue/config.yaml"
          env:
            - name: KQUEUE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KQUEUE_SIDECAR_IMAGE
              value: kqueue/sidecar:latest
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/kqueue
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: kqueue-config
---
apiVersion: v1
kind: Service
metadata:
  name: kqueue-controller
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-controller
    app.kubernetes.io/part-of: kqueue
spec:
  selector:
    app.kubernetes.io/name: kqueue-controller
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
