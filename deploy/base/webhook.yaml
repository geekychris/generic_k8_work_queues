apiVersion: apps/v1
kind: Deployment
metadata:
  name: kqueue-webhook
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-webhook
    app.kubernetes.io/part-of: kqueue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kqueue-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kqueue-webhook
        app.kubernetes.io/part-of: kqueue
    spec:
      containers:
        - name: webhook
          image: kqueue/webhook:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: KQUEUE_URL
              value: "http://kqueue-controller.kqueue.svc:8080"
            - name: QUEUE_NAME
              value: codereview
            - name: WEBHOOK_PORT
              value: "9000"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kqueue-webhook
  namespace: kqueue
  labels:
    app.kubernetes.io/name: kqueue-webhook
    app.kubernetes.io/part-of: kqueue
spec:
  selector:
    app.kubernetes.io/name: kqueue-webhook
  ports:
    - name: http
      port: 9000
      targetPort: 9000
